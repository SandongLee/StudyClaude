<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>SWT - Smart Card Bridge Console</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --ok: #4ade80;
      --err: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    .status-pill {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      background: #334155;
      color: var(--muted);
    }
    .status-pill.connected { background: #14532d; color: var(--ok); }
    .status-pill.disconnected { background: #7f1d1d; color: var(--err); }

    main {
      max-width: 960px;
      margin: 24px auto;
      padding: 0 24px;
      display: grid;
      gap: 16px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 14px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .row { display: flex; gap: 8px; align-items: center; }
    input[type="text"] {
      flex: 1;
      padding: 10px 12px;
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Consolas', monospace;
      font-size: 14px;
    }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: #0c4a6e;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.1); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: #475569; color: var(--text); }
    button.warn { background: #f59e0b; color: #422006; }
    button.danger { background: #ef4444; color: #fff; }
    button.cool { background: #06b6d4; color: #042e36; }

    select {
      width: 100%;
      padding: 8px;
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Consolas', monospace;
      font-size: 13px;
    }
    select:focus { outline: 1px solid var(--accent); }
    select option { padding: 4px; }

    textarea {
      width: 100%;
      min-height: 220px;
      padding: 12px;
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Consolas', monospace;
      font-size: 13px;
      resize: vertical;
    }
    .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .log-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0 0 12px;
    }
    .log-head h2 { margin: 0; }
    .toggle {
      display: flex;
      gap: 6px;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      text-transform: none;
      letter-spacing: 0;
    }
    .toggle input { accent-color: var(--accent); margin: 0; }
  </style>
</head>
<body>
  <header>
    <h1>🪪 SWT · Smart Card Bridge Console</h1>
    <span id="status" class="status-pill disconnected">Bridge: disconnected</span>
  </header>

  <main>
    <section class="card">
      <h2>1. Reader 선택 / 카드 제어</h2>
      <select id="readerSelect" size="3"><option disabled>(리더기 검색 중...)</option></select>
      <div class="row" style="margin-top: 10px;">
        <button id="btnConnect">연결</button>
        <button id="btnReset" class="cool">Cold Reset</button>
        <button id="btnWarmReset" class="warn">Warm Reset</button>
        <button id="btnDisconnect" class="danger">연결 끊기</button>
      </div>
      <div class="hint" id="readerHint" style="margin-top: 8px;">리더기를 선택한 뒤 「연결」을 누르세요.</div>
      <div class="hint" style="margin-top: 4px;">Cold Reset = 카드 전원 사이클 / Warm Reset = 논리적 리셋(전원 유지)</div>
    </section>

    <section class="card">
      <h2>2. APDU 전송</h2>
      <div class="row">
        <input id="apduInput" type="text" placeholder="예: 00A4040000" value="00A4040000" />
        <button id="btnSend">Send APDU</button>
      </div>
      <div class="hint">Hex 문자열로 입력하세요 (공백 무시).</div>
    </section>

    <section class="card">
      <div class="log-head">
        <h2>3. 응답 로그</h2>
        <label class="toggle">
          <input type="checkbox" id="autoGetResp" />
          Auto Get Response (61xx / 6Cxx)
        </label>
      </div>
      <textarea id="response" readonly placeholder="응답이 여기에 표시됩니다..."></textarea>
      <div class="row" style="margin-top: 8px; justify-content: flex-end;">
        <button class="secondary" id="btnClear">Clear</button>
      </div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const statusEl = $('status');
    const respEl = $('response');
    let ws = null;
    let bridgeUrl = 'ws://localhost:8081';
    let lastApdu = null;
    let autoChain = 0;
    const AUTO_CHAIN_MAX = 8;

    function log(line) {
      const ts = new Date().toLocaleTimeString();
      respEl.value += `[${ts}] ${line}\n`;
      respEl.scrollTop = respEl.scrollHeight;
    }

    function setStatus(connected) {
      statusEl.classList.toggle('connected', connected);
      statusEl.classList.toggle('disconnected', !connected);
      statusEl.textContent = connected ? 'Bridge: connected' : 'Bridge: disconnected';
    }

    function connect() {
      try {
        ws = new WebSocket(bridgeUrl);
      } catch (e) {
        log(`WS 생성 실패: ${e.message}`);
        return;
      }

      ws.onopen = () => {
        setStatus(true);
        log(`브리지 연결됨 (${bridgeUrl})`);
      };
      ws.onclose = () => {
        setStatus(false);
        log('브리지 연결 종료. 5초 후 재시도...');
        setTimeout(connect, 5000);
      };
      ws.onerror = () => {
        log('브리지 연결 오류');
      };
      ws.onmessage = (ev) => {
        try {
          const msg = JSON.parse(ev.data);
          if (msg.type === 'READERS') {
            renderReaders(msg.readers || []);
          } else if (msg.type === 'CONNECT_OK') {
            log(`연결됨: ${msg.reader} (ATR=${msg.atr || 'n/a'})`);
          } else if (msg.type === 'DISCONNECT_OK') {
            log(`연결 끊김: ${msg.reader || '(없음)'}`);
          } else if (msg.type === 'WARM_RESET_OK') {
            log(`Warm Reset OK: ${msg.reader} (ATR=${msg.atr || 'n/a'})`);
          } else if (msg.type === 'COLD_RESET_OK') {
            log(`Cold Reset OK: ${msg.reader} (ATR=${msg.atr || 'n/a'})`);
          } else if (msg.type === 'RESET_OK') {
            log(`ATR: ${msg.atr}`);
          } else if (msg.type === 'TRANSMIT_OK') {
            log(`<= ${msg.response}  (SW=${msg.sw})`);
            maybeAutoGetResponse(msg);
          } else if (msg.type === 'ERROR') {
            log(`ERROR: ${msg.message}`);
          } else {
            log(`수신: ${ev.data}`);
          }
        } catch {
          log(`수신(raw): ${ev.data}`);
        }
      };
    }

    function renderReaders(list) {
      const sel = $('readerSelect');
      const prev = sel.value;
      sel.innerHTML = '';
      if (!list.length) {
        const opt = document.createElement('option');
        opt.textContent = '(연결 가능한 리더기가 없습니다)';
        opt.disabled = true;
        sel.appendChild(opt);
        $('readerHint').textContent = '리더기를 USB에 연결한 뒤 잠시 기다리세요.';
        return;
      }
      for (const r of list) {
        const opt = document.createElement('option');
        const cardMark = r.hasCard ? '💳' : '∅';
        const connMark = r.connected ? ' ✓연결됨' : '';
        opt.value = r.name;
        opt.textContent = `${cardMark} ${r.name}${connMark}`;
        sel.appendChild(opt);
      }
      if (prev && list.some(r => r.name === prev)) {
        sel.value = prev;
      } else {
        const conn = list.find(r => r.connected);
        sel.value = conn ? conn.name : list[0].name;
      }
      const cur = list.find(r => r.connected);
      $('readerHint').textContent = cur
        ? `현재 연결: ${cur.name}`
        : '리더기를 선택한 뒤 「연결」을 누르세요.';
    }

    function selectedReader() {
      const sel = $('readerSelect');
      const v = sel.value;
      if (!v || sel.selectedOptions[0]?.disabled) return null;
      return v;
    }

    function sendApdu(hex, auto) {
      lastApdu = hex.toUpperCase();
      log(`${auto ? '[auto] ' : ''}=> TRANSMIT ${lastApdu}`);
      send({ action: 'TRANSMIT', apdu: lastApdu });
    }

    function maybeAutoGetResponse(msg) {
      if (!$('autoGetResp').checked) { autoChain = 0; return; }
      const sw = (msg.sw || '').toUpperCase();
      if (autoChain >= AUTO_CHAIN_MAX) {
        log(`[auto] chain limit(${AUTO_CHAIN_MAX}) 도달 - 중단`);
        autoChain = 0;
        return;
      }
      if (sw.startsWith('61')) {
        const le = sw.slice(2);
        const cla = (lastApdu || '00').slice(0, 2);
        const next = `${cla}C00000${le}`;
        autoChain++;
        setTimeout(() => sendApdu(next, true), 30);
      } else if (sw.startsWith('6C')) {
        if (!lastApdu || lastApdu.length < 10) { autoChain = 0; return; }
        const le = sw.slice(2);
        const next = lastApdu.slice(0, -2) + le;
        autoChain++;
        setTimeout(() => sendApdu(next, true), 30);
      } else {
        autoChain = 0;
      }
    }

    function send(obj) {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log('브리지가 연결되어 있지 않습니다.');
        return;
      }
      ws.send(JSON.stringify(obj));
    }

    $('btnConnect').addEventListener('click', () => {
      const name = selectedReader();
      if (!name) { log('리더기를 선택하세요.'); return; }
      log(`=> CONNECT ${name}`);
      send({ action: 'CONNECT', reader: name });
    });

    $('btnDisconnect').addEventListener('click', () => {
      log('=> DISCONNECT');
      send({ action: 'DISCONNECT' });
    });

    $('btnWarmReset').addEventListener('click', () => {
      log('=> WARM_RESET');
      send({ action: 'WARM_RESET' });
    });

    $('btnReset').addEventListener('click', () => {
      const name = selectedReader();
      log(`=> COLD_RESET${name ? ' ' + name : ''}`);
      send(name ? { action: 'COLD_RESET', reader: name } : { action: 'COLD_RESET' });
    });

    $('btnSend').addEventListener('click', () => {
      const raw = $('apduInput').value.replace(/\s+/g, '').toUpperCase();
      autoChain = 0;
      if (!/^[0-9A-F]+$/.test(raw) || raw.length % 2 !== 0) {
        log('APDU Hex 형식이 올바르지 않습니다.');
        return;
      }
      sendApdu(raw, false);
    });

    $('btnClear').addEventListener('click', () => { respEl.value = ''; });

    fetch('/api/config').then(r => r.json()).then(cfg => {
      if (cfg.bridgeUrl) bridgeUrl = cfg.bridgeUrl;
      connect();
    }).catch(() => connect());
  </script>
</body>
</html>
